<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 380px;
      height: 500px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      color: white;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #e94560, #c73652);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-dot {
      width: 10px; height: 10px;
      background: white;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .header h3 { font-size: 15px; font-weight: 600; }
    .header span { font-size: 11px; opacity: 0.8; margin-left: auto; }

    /* Extract button */
    .extract-section { padding: 12px 16px; border-bottom: 1px solid #1e1e2e; }
    #extractBtn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #e94560, #c73652);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    #extractBtn:hover { opacity: 0.85; }
    #status {
      margin-top: 8px;
      font-size: 11px;
      color: #a8a8b3;
      text-align: center;
    }
    #status.success { color: #4caf50; }
    #status.error { color: #e94560; }

    /* Chat area */
    #chatArea {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #chatArea::-webkit-scrollbar { width: 4px; }
    #chatArea::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }

    .bubble {
      max-width: 85%;
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .bubble.user {
      background: #e94560;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      background: #1e1e2e;
      color: #e2e2e2;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.thinking {
      background: #1e1e2e;
      color: #a8a8b3;
      align-self: flex-start;
      font-style: italic;
    }

    /* Input area */
    .input-section {
      padding: 10px 16px;
      border-top: 1px solid #1e1e2e;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #questionInput {
      flex: 1;
      padding: 9px 12px;
      border-radius: 20px;
      border: 1px solid #2e2e3e;
      background: #1e1e2e;
      color: white;
      font-size: 13px;
      outline: none;
    }
    #questionInput:focus { border-color: #e94560; }
    #askBtn {
      width: 36px; height: 36px;
      background: #e94560;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    #askBtn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-dot"></div>
    <h3>Webpage Q&A</h3>
    <span>AI Assistant</span>
  </div>

  <div class="extract-section">
    <button id="extractBtn">Extract &amp; Process Page</button>
    <div id="status">Process the page to start asking questions</div>
  </div>

  <div id="chatArea">
    <div class="bubble bot">
      Hi! Process the page above, then ask me anything about it.
    </div>
  </div>

  <div class="input-section">
    <input
      type="text"
      id="questionInput"
      placeholder="Ask about this page..."
    />
    <button id="askBtn">&#10148;</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
